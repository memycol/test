<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Michael's Portfolio</title>
    <style>
        /* Modern font stack for sharpness */
        body { 
            margin: 0; 
            background: #0a0a0a; 
            color: #ffffff; 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden; /* Keeps the canvas contained */
        }
        
        #canvas { position: fixed; top: 0; left: 0; z-index: -1; }

        main { 
            position: relative; 
            max-width: 800px; 
            margin: 20vh auto; 
            padding: 20px; 
            pointer-events: none; /* Allows mouse to interact with canvas behind text */
        }

        h1 { 
            font-weight: 300; /* Thin/Light weight instead of bold */
            font-size: 3.5rem; 
            margin: 0;
            letter-spacing: -1px;
        }

        .project-card { 
            background: rgba(255, 255, 255, 0.03); 
            padding: 25px; 
            border-radius: 12px; 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            margin-top: 40px;
            pointer-events: auto; /* Re-enable for links */
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <main>
        <h1>hey, im Michael</h1>
        <p>Building clean, high-performance digital experiences.</p>
        
        <div class="project-card">
            <h3>Featured Project</h3>
            <p>A description of your work.</p>
        </div>
    </main>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const mouse = { x: null, y: null };

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 1;
                this.speedX = Math.random() * 1 - 0.5;
                this.speedY = Math.random() * 1 - 0.5;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (mouse.x) {
                    let dx = mouse.x - this.x;
                    let dy = mouse.y - this.y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < 150) { // Interaction radius
                        this.x -= dx * 0.02;
                        this.y -= dy * 0.02;
                    }
                }
                if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.reset();
            }
            draw() {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < 100; i++) particles.push(new Particle());

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
