<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memycol | Portfolio</title>
    <style>
        body { 
            margin: 0; 
            background: #0a0a0a; 
            color: #ffffff; 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        
        #canvas { position: fixed; top: 0; left: 0; z-index: -1; }

        .profile-container { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            text-align: center;
            padding: 20px;
        }
        
        .profile-img { 
            width: 150px; height: 150px; border-radius: 50%; 
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
            margin-bottom: 20px; object-fit: cover;
            transition: 0.4s;
        }

        .profile-img:hover {
            border-color: rgba(255, 255, 255, 0.5);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.4);
        }

        h1 { font-size: 3rem; font-weight: 300; margin: 0; letter-spacing: -1px; }
        .title { color: #888; font-size: 1.2rem; margin-bottom: 30px; letter-spacing: 1px; }
        .bio { font-size: 1.1rem; line-height: 1.6; color: #ccc; max-width: 500px; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <main class="profile-container">
        <img src="https://github.com/memycol.png" alt="Memycol" class="profile-img">
        
        <h1>Memycol</h1>
        <p class="title">Developer • Designer • Creator</p>
        
        <p class="bio">
            I build modern desktop applications, game utilities, automation tools, 
            and high-performance web experiences.
        </p>
    </main>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const mouse = { x: null, y: null };

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 1;
                this.speedX = Math.random() * 1 - 0.5;
                this.speedY = Math.random() * 1 - 0.5;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (mouse.x) {
                    let dx = mouse.x - this.x;
                    let dy = mouse.y - this.y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < 150) {
                        this.x -= dx * 0.02;
                        this.y -= dy * 0.02;
                    }
                }
                if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.reset();
            }
            draw() {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < 100; i++) particles.push(new Particle());

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
