<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memycol | Portfolio</title>
    <style>
        body { 
            margin: 0; 
            background: #0a0a0a; 
            color: #ffffff; 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        
        #canvas { position: fixed; top: 0; left: 0; z-index: -1; }

        .profile-container { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            text-align: center;
            padding: 40px;
            /* Glassmorphism Effect */
            background: rgba(10, 10, 10, 0.6);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            /* Micro-Interaction */
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10;
        }

        .profile-container:hover {
            transform: scale(1.02);
        }
        
        .profile-img { 
            width: 150px; height: 150px; border-radius: 50%; 
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
            margin-bottom: 20px; object-fit: cover;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .profile-img:hover {
            border-color: rgba(255, 255, 255, 0.5);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.4);
        }

        h1 { font-size: 3rem; font-weight: 300; margin: 0; letter-spacing: -1px; }
        .title { color: #888; font-size: 1.2rem; margin-bottom: 30px; letter-spacing: 1px; }
        .bio { font-size: 1.1rem; line-height: 1.6; color: #ccc; max-width: 500px; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <main class="profile-container">
        <img src="https://github.com/memycol.png" alt="Memycol" class="profile-img">
        
        <h1>Memycol</h1>
        <p class="title">Developer • Designer • Creator</p>
        
        <p class="bio">
            I build and vibecode modern desktop applications, game utilities, automation tools, 
            and web experiences.
        </p>
    </main>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const container = document.querySelector('.profile-container');
        let width, height;
        const mouse = { x: -1000, y: -1000 };

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        window.addEventListener('mousemove', e => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
            
            // Tilt effect
            let x = (mouse.x - window.innerWidth / 2) / 50;
            let y = (mouse.y - window.innerHeight / 2) / 50;
            container.style.transform = `perspective(1000px) rotateY(${x}deg) rotateX(${-y}deg) scale(1.02)`;
        });
        resize();

        let t = 0;
        function animate() {
            ctx.fillStyle = 'rgba(10, 10, 10, 0.05)';
            ctx.fillRect(0, 0, width, height);

            ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
            ctx.lineWidth = 1;

            for (let i = 0; i < 20; i++) {
                ctx.beginPath();
                let x = (width / 20) * i;
                ctx.moveTo(x, 0);

                for (let y = 0; y < height; y += 20) {
                    let angle = Math.sin(x * 0.005 + t) * 2 + Math.cos(y * 0.005 + t) * 2;
                    let dx = mouse.x - x;
                    let dy = mouse.y - y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < 200) {
                        angle += (200 - dist) * 0.01;
                    }
                    x += Math.cos(angle) * 10;
                    ctx.lineTo(x, y);
                }
                ctx.stroke();
            }
            t += 0.02;
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
