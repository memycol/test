<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <style>
        :root { --glow-color: #00d4ff; }
        body { 
            margin: 0; background: #0a0a0a; color: white; 
            font-family: 'Segoe UI', sans-serif; overflow-x: hidden;
        }
        /* Mouse-interactive Background */
        #bg { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), #1a1a2e, #0a0a0a);
            z-index: -1; transition: background 0.2s ease;
        }
        main { max-width: 800px; margin: 100px auto; padding: 20px; }
        h1 { font-size: 3rem; font-weight: 800; text-shadow: 0 0 10px var(--glow-color); }
        .project-card { 
            background: rgba(255, 255, 255, 0.05); padding: 25px; border-radius: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px);
            transition: 0.3s; margin-bottom: 20px;
        }
        .project-card:hover { 
            transform: translateY(-10px); border-color: var(--glow-color);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.2); 
        }
        a { color: var(--glow-color); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div id="bg"></div>
    <main>
        <h1>Hello, I'm [Your Name]</h1>
        <p>Building high-performance, beautiful digital experiences.</p>
        
        <div class="project-card">
            <h3>My Amazing Project</h3>
            <p>This is where you describe your project with bold intent. It looks great in dark mode.</p>
            <a href="#">View Project →</a>
        </div>
    </main>

    <script>
        document.addEventListener('mousemove', (e) => {
            const bg = document.getElementById('bg');
            bg.style.setProperty('--x', (e.clientX / window.innerWidth) * 100 + '%');
            bg.style.setProperty('--y', (e.clientY / window.innerHeight) * 100 + '%');
        });
    </script>
</body>
</html>
